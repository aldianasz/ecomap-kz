<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoMap KZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        html, body { height: auto; overflow-y: auto; scroll-behavior: smooth; background-color: #f8fafc; }
        #map { width: 100%; height: 100%; min-height: 100%; display: block; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .scanner-line { animation: scan 2s linear infinite; }
        @keyframes scan { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
        .leaflet-popup-content-wrapper { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border-radius: 12px; border: 1px solid #e2e8f0; }
        .celebrate-animation { animation: celebrate 0.6s ease-in-out 3; }
        @keyframes celebrate { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased relative">

    <!-- Словарь переводов -->
    <script>
        const dict = {
            kk: {
                "title": "EcoMap KZ", "nav": "Навигация", "report": "Шағым беру", "report-sub": "Карта және өтініш", "about": "Біз кімбіз?", "about-sub": "Жоба туралы", "recycle": "Қайта өңдеу нүктелері", "recycle-sub": "Қалдықтарды қабылдау", "auth": "Кіру / Тіркелу", "profile": "Менің аккаунтым", "profile-sub": "Прогресс", "search": "Алматы мекенжайы...", "find": "Іздеу", "report-h": "Мәселе туралы хабарлау", "form-cat": "Санат", "form-desc": "Сипаттама", "form-photo": "Фото жүктеу", "submit": "Жіберу", "rank": "Эко-деңгей", "logout": "Шығу"
            },
            ru: {
                "title": "EcoMap KZ", "nav": "Навигация", "report": "Подать жалобу", "report-sub": "Карта и форма", "about": "Кто мы?", "about-sub": "О проекте", "recycle": "Пункты переработки", "recycle-sub": "Каталог точек", "auth": "Войти / Регистрация", "profile": "Мой аккаунт", "profile-sub": "Прогресс", "search": "Адрес в Алматы...", "find": "Найти", "report-h": "Сообщить о проблеме", "form-cat": "Категория", "form-desc": "Описание проблемы", "form-photo": "Фотография", "submit": "Отправить", "rank": "Эко-звание", "logout": "Выйти"
            },
            en: {
                "title": "EcoMap KZ", "nav": "Navigation", "report": "Submit report", "report-sub": "Map and form", "about": "Who are we?", "about-sub": "About project", "recycle": "Recycle points", "recycle-sub": "Collection points", "auth": "Login / Register", "profile": "My account", "profile-sub": "Progress", "search": "Address in Almaty...", "find": "Find", "report-h": "Report an issue", "form-cat": "Category", "form-desc": "Description", "form-photo": "Upload photo", "submit": "Submit", "rank": "Eco-rank", "logout": "Logout"
            }
        };

        function setLang(lang) {
            localStorage.setItem('eco_lang', lang);
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[lang][key]) el.innerText = dict[lang][key];
            });
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.style.borderColor = btn.dataset.lang === lang ? '#10b981' : 'transparent';
                btn.style.backgroundColor = btn.dataset.lang === lang ? '#ecfdf5' : '#f8fafc';
            });
        }
    </script>

    <!-- Боковое меню -->
    <div id="sideDrawer" class="fixed top-0 left-0 h-full w-[85%] md:w-[380px] bg-white z-[9999] shadow-2xl transform -translate-x-full transition-transform duration-300 p-6 flex flex-col">
        <div class="flex items-center justify-between mb-6">
            <span class="text-xl font-bold text-emerald-600">🌍 <span data-i18n="title">EcoMap KZ</span></span>
            <button onclick="document.getElementById('sideDrawer').classList.add('-translate-x-full')" class="text-2xl text-slate-400">&times;</button>
        </div>

        <div class="flex gap-2 mb-6">
            <button onclick="setLang('kk')" data-lang="kk" class="lang-btn px-3 py-1 rounded-lg border-2 text-xs font-bold">🇰🇿 ҚАЗ</button>
            <button onclick="setLang('ru')" data-lang="ru" class="lang-btn px-3 py-1 rounded-lg border-2 text-xs font-bold">🇷🇺 РУС</button>
            <button onclick="setLang('en')" data-lang="en" class="lang-btn px-3 py-1 rounded-lg border-2 text-xs font-bold">🇬🇧 ENG</button>
        </div>

        <nav class="flex flex-col gap-3">
            <span class="text-[10px] font-bold uppercase text-slate-400" data-i18n="nav">Навигация</span>
            <button class="w-full flex items-center gap-3 bg-slate-50 p-4 rounded-xl text-left hover:bg-emerald-50 transition-colors">
                <span>🗺</span>
                <div>
                    <div class="font-semibold text-sm" data-i18n="report">Подать жалобу</div>
                    <div class="text-[10px] text-slate-400" data-i18n="report-sub">Карта и форма</div>
                </div>
            </button>
            <button class="w-full flex items-center gap-3 bg-slate-50 p-4 rounded-xl text-left hover:bg-emerald-50 transition-colors">
                <span>👥</span>
                <div>
                    <div class="font-semibold text-sm" data-i18n="about">Кто мы?</div>
                    <div class="text-[10px] text-slate-400" data-i18n="about-sub">О проекте</div>
                </div>
            </button>
        </nav>
    </div>

    <!-- Основной контент -->
    <header class="h-16 bg-white/80 backdrop-blur-md border-b flex items-center justify-between px-6 sticky top-0 z-[2000]">
        <button onclick="document.getElementById('sideDrawer').classList.remove('-translate-x-full')" class="font-bold text-emerald-600">🌍 EcoMap KZ</button>
    </header>

    <div class="w-full h-[60vh] relative">
        <main id="map"></main>
    </div>

    <div class="max-w-3xl mx-auto p-6 space-y-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <h2 class="text-xl font-bold mb-4" data-i18n="report-h">Сообщить о проблеме</h2>
            <form class="space-y-4">
                <label class="block text-xs font-bold uppercase text-slate-400" data-i18n="form-cat">Категория</label>
                <select class="w-full bg-slate-50 p-3 rounded-lg border text-sm"></select>
                
                <label class="block text-xs font-bold uppercase text-slate-400" data-i18n="form-desc">Описание</label>
                <textarea class="w-full bg-slate-50 p-3 rounded-lg border text-sm" rows="3"></textarea>
                
                <button class="w-full bg-emerald-500 text-white font-bold py-3 rounded-xl shadow-lg" data-i18n="submit">Отправить</button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Инициализация карты
        const map = L.map('map').setView([43.2389, 76.9454], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Применение языка при загрузке
        const savedLang = localStorage.getItem('eco_lang') || 'ru';
        setLang(savedLang);
    </script>
</body>
</html>
