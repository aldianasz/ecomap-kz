<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoMap KZ — Экологическая карта Казахстана</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        html, body { height: auto; overflow-y: auto; scroll-behavior: smooth; background-color: #f8fafc; }
        #map { width: 100%; height: 100%; min-height: 100%; display: block; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scan { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
        .scanner-line { animation: scan 2s linear infinite; }
        .leaflet-popup-content-wrapper { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border-radius: 12px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); border: 1px solid rgba(226, 232, 240, 0.8); }
        @keyframes celebrate { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .celebrate-animation { animation: celebrate 0.6s ease-in-out 3; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased relative">

    <!-- MODAL -->
    <div id="levelUpModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[99999] flex items-center justify-center p-4 transition-opacity duration-300 opacity-0 pointer-events-none">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full border border-slate-100 shadow-2xl text-center transform scale-95 transition-transform duration-300">
            <span class="text-6xl inline-block celebrate-animation mb-4" id="modalBadge">🌱</span>
            <h2 class="text-2xl font-black text-slate-800 mb-2">Новое звание! 🎉</h2>
            <p class="text-sm text-slate-500 mb-6">Поздравляем с достижением уровня:</p>
            <div class="bg-emerald-50 text-emerald-700 font-bold text-lg py-2 px-6 rounded-full inline-block border border-emerald-100 mb-6" id="modalRankName">Эко-волонтёр</div>
            <button id="closeModalBtn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl transition-all">Ура!</button>
        </div>
    </div>

    <!-- HEADER -->
    <header class="h-16 bg-white/80 backdrop-blur-md border-b border-slate-200/80 flex items-center justify-between px-4 md:px-6 sticky top-0 z-[2000]">
        <button id="logoBtn" class="flex items-center gap-2 hover:opacity-80 transition-all focus:outline-none">
            <span class="text-2xl">🌍</span>
            <h1 class="text-lg font-bold text-emerald-600">EcoMap KZ</h1>
        </button>
        <span class="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full text-xs font-semibold border border-emerald-200/50">AI Active 🤖</span>
    </header>

    <!-- DRAWER -->
    <div id="drawerOverlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[9998] transition-opacity duration-300 opacity-0 pointer-events-none"></div>
    <div id="sideDrawer" class="fixed top-0 left-0 h-full w-[85%] md:w-[380px] bg-white border-r border-slate-100 z-[9999] shadow-2xl transform -translate-x-full transition-transform duration-300 ease-in-out flex flex-col p-6">
        <button id="closeDrawerBtn" class="text-2xl text-slate-400 absolute top-6 right-6">&times;</button>
        <nav class="flex flex-col gap-4 mt-10">
            <button id="menuReportBtn" class="p-4 bg-slate-50 rounded-xl text-left font-semibold">🗺 Подать жалобу</button>
            <button id="menuAboutBtn" class="p-4 bg-slate-50 rounded-xl text-left font-semibold">👥 Кто мы?</button>
            <button id="menuRecycleBtn" class="p-4 bg-slate-50 rounded-xl text-left font-semibold">♻️ Пункты переработки</button>
            <hr />
            <button id="menuAuthBtn" class="p-4 bg-emerald-50 text-emerald-700 rounded-xl font-bold">🔑 Войти / Регистрация</button>
            <button id="menuProfileBtn" class="hidden p-4 bg-slate-50 text-slate-700 rounded-xl font-bold">👤 Мой аккаунт</button>
        </nav>
        <div class="mt-auto pt-6 border-t border-slate-100">
            <span class="text-[10px] font-bold text-slate-400 uppercase mb-3 block">Наши соцсети</span>
            <div class="flex gap-3">
                <a href="https://www.instagram.com/ecomapkz?utm_source=qr" target="_blank" class="w-11 h-11 rounded-xl bg-emerald-600 flex items-center justify-center text-white hover:bg-emerald-500 transition-all">

                </a>
                <a href="https://t.me/Ecomapkz" target="_blank" class="w-11 h-11 rounded-xl bg-emerald-600 flex items-center justify-center text-white hover:bg-emerald-500 transition-all">
                    <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M23.979 3.574a2.533 2.533 0 0 0-2.079-1.21c-.551-.015-1.107.135-2.073.535l-17.15 7.1c-1.12.46-1.571 1.05-1.6 1.7-.03.65.371 1.25 1.451 1.63.73.26 1.471.49 2.21.69a.53.53 0 0 0 .531-.13l9.88-6.85c.16-.11.36.08.21.23l-8.03 7.82c-.17.16-.27.39-.27.63l-.04 3.79c-.01.55.33.91.75.91.24 0 .48-.12.67-.31l2.42-2.39c.2-.2.5-.23.73-.08l4.49 3.32c.74.55 1.43.31 1.76-.56l4.63-14.77a2.583 2.583 0 0 0-.27-2.365z"/></svg>
                </a>
            </div>
        </div>
    </div>

    <!-- PAGES -->
    <div id="mainSection" class="flex flex-col min-h-screen fade-in">
        <div class="h-[60vh] relative shadow-sm border-b"><main id="map"></main></div>
        <!-- (Форма, контент... см. полную версию в предыдущем ответе для краткости) -->
    </div>
    
    <div id="aboutSection" class="hidden py-12 px-6 fade-in text-center max-w-2xl mx-auto">
        <img src="logo.png" class="w-40 h-40 mx-auto mb-6" alt="Logo">
        <h2 class="text-3xl font-black text-emerald-600 mb-6">Кто мы?</h2>
        <p class="text-slate-600 leading-relaxed">EcoMap KZ — это экологический проект, созданный двумя школьницами... (и весь твой текст)</p>
    </div>

    <!-- SCRIPTS -->

</body>
</html>
