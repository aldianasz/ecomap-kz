<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoMap KZ — Экологическая карта с ИИ</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Стили Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Высота карты по умолчанию для десктопа */
        #map { height: 100%; }
        
        /* Анимация сканирования ИИ */
        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }
        .scanner-line {
            animation: scan 2s linear infinite;
        }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans overflow-x-hidden md:overflow-hidden h-screen flex flex-col">

    <!-- Шапка сайта -->
    <header class="h-16 bg-slate-800 border-b border-slate-700 flex items-center justify-between px-4 md:px-6 shrink-0 z-10">
        <div class="flex items-center gap-2 md:grid-cols-2">
            <span class="text-xl md:text-2xl">🌍</span>
            <h1 class="text-lg md:text-xl font-bold tracking-wider text-emerald-400">EcoMap KZ</h1>
        </div>
        <div>
            <span class="bg-emerald-500/10 text-emerald-400 px-2.5 py-1 rounded-full text-xs border border-emerald-500/20">
                AI Active 🤖
            </span>
        </div>
    </header>

    <!-- Основной контейнер -->
    <div class="flex flex-col md:flex-row flex-1 min-h-0 relative">
        
        <!-- Карта (на мобильных идет ПЕРВОЙ и занимает 45% экрана, на ПК — на весь экран справа) -->
        <main id="map" class="w-full h-[45vh] md:h-auto md:flex-1 order-1 md:order-2 z-0"></main>

        <!-- Боковая панель (на мобильных идет ВТОРОЙ, скроллится вниз, на ПК — слева 384px) -->
        <aside class="w-full md:w-96 bg-slate-800/95 border-t md:border-t-0 md:border-r border-slate-700 p-4 md:p-6 flex flex-col gap-5 overflow-y-auto order-2 md:order-1 shrink-0 z-[1000] shadow-2xl">
            <div>
                <h2 class="text-base md:text-lg font-semibold mb-1 text-emerald-300">Сообщить о проблеме</h2>
                <p class="text-xs text-slate-400">Нажмите на карту выше, чтобы выбрать место, загрузите фото и отправьте.</p>
            </div>

            <!-- Форма отправки -->
            <form id="ecoForm" class="flex flex-col gap-4">
                <div>
                    <label class="block text-[10px] font-semibold text-slate-400 uppercase mb-1.5">Категория</label>
                    <select id="category" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-emerald-500 text-sm">
                        <option value="🗑 Незаконная свалка">🗑 Незаконная свалка</option>
                        <option value="🌊 Загрязнение водоёма">🌊 Загрязнение водоёма</option>
                        <option value="🌳 Вырубка деревьев">🌳 Вырубка деревьев</option>
                        <option value="🌫 Плохой воздух">🌫 Плохой воздух</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-semibold text-slate-400 uppercase mb-1.5">Описание проблемы</label>
                    <textarea id="description" rows="2" placeholder="Опишите детали..." class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-emerald-500 text-xs" required></textarea>
                </div>

                <!-- Загрузка фото -->
                <div>
                    <label class="block text-[10px] font-semibold text-slate-400 uppercase mb-1.5">Фотография</label>
                    <label class="flex flex-col items-center justify-center w-full h-16 border-2 border-slate-600 border-dashed rounded-lg cursor-pointer bg-slate-750 hover:bg-slate-700 hover:border-emerald-500 transition-colors">
                        <div class="flex flex-col items-center justify-center py-2">
                            <span class="text-lg mb-0.5">📸</span>
                            <p class="text-[11px] text-slate-400" id="uploadText">Загрузить фото</p>
                        </div>
                        <input type="file" id="photoInput" accept="image/*" class="hidden" required />
                    </label>
                    
                    <!-- Визуальный контейнер ИИ анализа -->
                    <div id="previewContainer" class="hidden mt-3 relative overflow-hidden rounded-lg border border-slate-600">
                        <img id="imagePreview" src="" class="w-full h-28 object-cover" />
                        <div id="aiScanner" class="absolute left-0 right-0 h-1 bg-emerald-400 shadow-[0_0_10px_#34d399] scanner-line"></div>
                        <div class="absolute inset-0 bg-slate-900/60 flex items-center justify-center" id="aiStatusBg">
                            <span class="text-[11px] font-bold px-2 py-1 rounded" id="aiStatusText">ИИ анализирует... 🤖</span>
                        </div>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold py-2 rounded-lg text-sm transition-colors shadow-lg shadow-emerald-500/20">
                    Отправить обращение
                </button>
            </form>

            <hr class="border-slate-700" />

            <!-- Динамический рейтинг районов -->
            <div>
                <h3 class="text-xs font-semibold text-slate-400 uppercase mb-2.5">Рейтинг районов (EcoScore)</h3>
                <div class="space-y-1.5 text-xs" id="scoreTable">
                    <div class="flex justify-between items-center bg-slate-750 p-2 rounded border border-slate-700/50" id="district-medeu">
                        <span>Медеуский</span>
                        <span class="font-bold text-emerald-400 score-val">91</span>
                    </div>
                    <div class="flex justify-between items-center bg-slate-750 p-2 rounded border border-slate-700/50" id="district-bostandyk">
                        <span>Бостандыкский</span>
                        <span class="font-bold text-yellow-400 score-val">85</span>
                    </div>
                    <div class="flex justify-between items-center bg-slate-750 p-2 rounded border border-slate-700/50" id="district-almaly">
                        <span>Алмалинский</span>
                        <span class="font-bold text-orange-400 score-val">79</span>
                    </div>
                </div>
            </div>
        </aside>

    </div>

    <!-- Скрипты Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const districtScores = { medeu: 91, bostandyk: 85, almaly: 79 };

        function detectDistrict(lat, lng) {
            if (lng > 76.95) return 'medeu';
            if (lat < 43.23) return 'bostandyk';
            return 'almaly';
        }

        function updateScoreboard() {
            document.querySelector('#district-medeu .score-val').innerText = districtScores.medeu;
            document.querySelector('#district-bostandyk .score-val').innerText = districtScores.bostandyk;
            document.querySelector('#district-almaly .score-val').innerText = districtScores.almaly;

            ['medeu', 'bostandyk', 'almaly'].forEach(id => {
                const el = document.querySelector(`#district-${id} .score-val`);
                const score = districtScores[id];
                el.className = "font-bold score-val";
                if (score >= 85) el.classList.add('text-emerald-400');
                else if (score >= 75) el.classList.add('text-yellow-400');
                else el.classList.add('text-rose-400');
            });
        }

        // Инициализация карты
        const map = L.map('map').setView([43.238949, 76.945408], 12);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OSM & CARTO'
        }).addTo(map);

        function addMarker(report) {
            const marker = L.marker(report.coords).addTo(map);
            const imgHtml = report.photoUrl 
                ? `<img src="${report.photoUrl}" class="w-full h-24 object-cover rounded-lg my-1.5 border border-slate-200" />` 
                : '';

            const popupContent = `
                <div class="text-slate-900 font-sans p-1 w-48">
                    <h3 class="font-bold text-xs mb-1">${report.category}</h3>
                    <p class="text-[11px] text-slate-600 mb-1">${report.desc}</p>
                    ${imgHtml}
                    <div class="flex flex-col gap-1 mt-1">
                        <span class="inline-block bg-slate-200 text-slate-800 text-[9px] font-bold px-1.5 py-0.5 rounded w-max">
                            Статус: ${report.status}
                        </span>
                        <span class="inline-block bg-emerald-100 text-emerald-800 text-[8px] font-semibold px-1.5 py-0.5 rounded w-max">
                            🤖 Проверено ИИ
                        </span>
                    </div>
                </div>
            `;
            marker.bindPopup(popupContent);
        }

        const photoInput = document.getElementById('photoInput');
        const uploadText = document.getElementById('uploadText');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const aiScanner = document.getElementById('aiScanner');
        const aiStatusBg = document.getElementById('aiStatusBg');
        const aiStatusText = document.getElementById('aiStatusText');
        const submitBtn = document.getElementById('submitBtn');
        
        let selectedPhotoUrl = null;
        let isAiVerified = false;

        photoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                selectedPhotoUrl = URL.createObjectURL(file);
                imagePreview.src = selectedPhotoUrl;
                
                previewContainer.classList.remove('hidden');
                aiScanner.classList.remove('hidden');
                aiStatusBg.className = "absolute inset-0 bg-slate-900/60 flex items-center justify-center";
                aiStatusText.innerText = "ИИ анализирует фото... 🤖";
                aiStatusText.className = "text-[10px] font-bold px-2 py-1 rounded bg-slate-800 text-amber-400";
                submitBtn.disabled = true;
                submitBtn.innerText = "ИИ проверяет фото...";

                setTimeout(() => {
                    isAiVerified = true; 
                    aiScanner.classList.add('hidden');
                    aiStatusBg.className = "absolute top-1.5 left-1.5 flex items-center justify-center";
                    aiStatusText.innerText = "✔ Проверено ИИ";
                    aiStatusText.className = "text-[9px] font-bold px-1.5 py-0.5 rounded bg-emerald-500 text-slate-950";
                    
                    uploadText.innerText = "Успешно!";
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Отправить обращение";
                }, 1800);
            }
        });

        let tempCoords = null;
        let tempMarker = null;

        map.on('click', function(e) {
            tempCoords = [e.latlng.lat, e.latlng.lng];
            if (tempMarker) map.removeLayer(tempMarker);
            tempMarker = L.marker(tempCoords, {opacity: 0.6}).addTo(map);
        });

        document.getElementById('ecoForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const category = document.getElementById('category').value;
            const description = document.getElementById('description').value;

            if (!tempCoords) {
                alert("Пожалуйста, сначала кликните на карту выше!");
                return;
            }

            if (!isAiVerified) {
                alert("Пожалуйста, дождитесь окончания проверки ИИ!");
                return;
            }

            const newReport = {
                coords: tempCoords,
                category: category,
                desc: description,
                status: "🟡 Получено",
                photoUrl: selectedPhotoUrl
            };
            addMarker(newReport);

            const targetDistrict = detectDistrict(tempCoords[0], tempCoords[1]);
            if (districtScores[targetDistrict] > 0) {
                districtScores[targetDistrict] -= 2;
                updateScoreboard();
            }

            if (tempMarker) map.removeLayer(tempMarker);
            document.getElementById('ecoForm').reset();
            previewContainer.classList.add('hidden');
            uploadText.innerText = "Загрузить фото";
            tempCoords = null;
            selectedPhotoUrl = null;
            isAiVerified = false;

            const districtNames = { medeu: "Медеуский", bostandyk: "Бостандыкский", almaly: "Алмалинский" };
            alert(`Успешно! Жалоба добавлена. EcoScore района ${districtNames[targetDistrict]} понижен.`);
        });
    </script>
</body>
</html>
