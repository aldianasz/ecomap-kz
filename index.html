<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="site.title">EcoMap KZ — Экологическая карта Казахстана</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        html, body { height: auto; overflow-y: auto; scroll-behavior: smooth; background-color: #f8fafc; }
        #map { width: 100%; height: 100%; min-height: 100%; display: block; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scan { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
        .scanner-line { animation: scan 2s linear infinite; }
        .leaflet-popup-content-wrapper { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); border-radius: 12px; }
        .celebrate-animation { animation: celebrate 0.6s ease-in-out 3; }
        @keyframes celebrate { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased relative">

    <!-- МОДАЛКА ЗВАНИЯ -->
    <div id="levelUpModal" class="hidden fixed inset-0 bg-slate-900/60 z-[99999] flex items-center justify-center p-4 opacity-0 transition-opacity duration-300 pointer-events-none">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <span class="text-6xl inline-block celebrate-animation mb-4" id="modalBadge">🌱</span>
            <h2 class="text-2xl font-black text-slate-800" data-i18n="modal.new_rank">Новое звание! 🎉</h2>
            <button id="closeModalBtn" class="mt-6 w-full bg-emerald-500 text-white font-bold py-3 rounded-xl" data-i18n="modal.btn">Ура, продолжить!</button>
        </div>
    </div>

    <!-- ШАПКА -->
    <header class="h-16 bg-white/80 backdrop-blur-md border-b flex items-center justify-between px-4 sticky top-0 z-[2000]">
        <button id="logoBtn" class="flex items-center gap-2">
            <span class="text-xl">🌍</span>
            <h1 class="text-lg font-bold text-emerald-600">EcoMap KZ</h1>
        </button>
    </header>

    <!-- БОКОВОЕ МЕНЮ -->
    <div id="sideDrawer" class="fixed top-0 left-0 h-full w-[85%] md:w-[380px] bg-white z-[9999] shadow-2xl transform -translate-x-full transition-transform duration-300 p-6 flex flex-col">
        <!-- ЯЗЫКИ -->
        <div class="flex bg-slate-100 p-1 rounded-xl mb-6">
            <button onclick="setLang('kz')" id="btn-kz" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all">🇰🇿 ҚАЗ</button>
            <button onclick="setLang('ru')" id="btn-ru" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all">🇷🇺 РУС</button>
            <button onclick="setLang('en')" id="btn-en" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all">🇬🇧 ENG</button>
        </div>

        <nav class="flex flex-col gap-4">
            <button id="menuReportBtn" class="p-4 bg-slate-50 rounded-xl" data-i18n="nav.report">Подать жалобу</button>
            <button id="menuAboutBtn" class="p-4 bg-slate-50 rounded-xl" data-i18n="nav.about">Кто мы?</button>
            <button id="menuRecycleBtn" class="p-4 bg-slate-50 rounded-xl" data-i18n="nav.recycle">Пункты переработки</button>
        </nav>

        <!-- ТЕЛЕГРАМ (ИСПРАВЛЕННЫЙ) -->
        <div class="mt-auto pt-6 border-t">
            <a href="https://t.me/Ecomapkz" target="_blank" class="w-10 h-10 rounded-xl bg-[#229ED9] flex items-center justify-center text-white">
                <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/></svg>
            </a>
        </div>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main id="map" class="w-full h-[60vh]"></main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ЛОГИКА МУЛЬТИЯЗЫЧНОСТИ
        const i18n = {
            ru: { "site.title": "EcoMap KZ", "nav.report": "Подать жалобу", "nav.about": "Кто мы?", "nav.recycle": "Пункты переработки", "modal.new_rank": "Новое звание! 🎉", "modal.btn": "Ура, продолжить!" },
            kz: { "site.title": "EcoMap KZ", "nav.report": "Шағым жіберу", "nav.about": "Біз кімбіз?", "nav.recycle": "Қайта өңдеу орталықтары", "modal.new_rank": "Жаңа атақ! 🎉", "modal.btn": "Жалғастыру" },
            en: { "site.title": "EcoMap KZ", "nav.report": "Submit report", "nav.about": "Who we are?", "nav.recycle": "Recycling centers", "modal.new_rank": "New rank! 🎉", "modal.btn": "Continue" }
        };

        function setLang(lang) {
            localStorage.setItem('eco_lang', lang);
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang] && i18n[lang][key]) el.innerText = i18n[lang][key];
            });
            document.querySelectorAll('[id^=btn-]').forEach(b => b.classList.remove('bg-emerald-500', 'text-white'));
            document.getElementById('btn-' + lang).classList.add('bg-emerald-500', 'text-white');
        }

        // Инициализация
        const savedLang = localStorage.getItem('eco_lang') || 'ru';
        setLang(savedLang);

        // ВАША ЛОГИКА КАРТЫ И SUPABASE (продолжение кода...)
        const map = L.map('map').setView([43.238949, 76.945408], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // ... остальной код (открытие меню, обработка форм и т.д.) ...
        document.getElementById('logoBtn').addEventListener('click', () => {
            document.getElementById('sideDrawer').classList.remove('-translate-x-full');
        });
        document.getElementById('closeDrawerBtn').addEventListener('click', () => {
            document.getElementById('sideDrawer').classList.add('-translate-x-full');
        });
    </script>
</body>
</html>
